name: HK1-Armbian-LOCKED-6.12.90-RTL8733BS

on:
  workflow_dispatch:

env:
  TZ: Asia/Singapore
  KERNEL_VERSION: "6.12.90"
  KERNEL_FULL: "6.12.90-current-meson64"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:

    # =========================
    # 1. Checkout
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 2. Base deps
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git curl wget xz-utils unzip \
          kmod rsync file \
          qemu-user-static binfmt-support \
          fdisk mount util-linux build-essential

    # =========================
    # 3. Clone ophub tool
    # =========================
    - name: Clone ophub tool
      run: |
        git clone --depth=1 https://github.com/ophub/amlogic-s9xxx-armbian.git builder

    # =========================
    # 4. FORCE build Armbian base
    #    ❗不使用 stable kernel
    # =========================
    - name: Build base image (no kernel control)
      run: |
        cd builder

        ./rebuild \
          -b hk1-rbox-k8s \
          -r ophub/kernel \
          -t ext4 \
          -u stable \
          -s 512/3000

    # =========================
    # 5. Replace kernel with 6.12.90 (FORCE)
    # =========================
    - name: FORCE kernel 6.12.90 download
      run: |
        mkdir -p kernel
        cd kernel

        wget https://github.com/ophub/kernel/releases/download/kernel_stable/6.12.90.tar.gz
        tar -xf 6.12.90.tar.gz

    # =========================
    # 6. Find image
    # =========================
    - name: Locate image
      run: |
        IMG=$(find builder/build/output/images -name "*.img*" | head -n1)
        echo "IMG=$IMG" >> $GITHUB_ENV

    # =========================
    # 7. Mount image
    # =========================
    - name: Mount image
      run: |
        sudo mkdir -p /mnt/armbian

        LOOP=$(sudo losetup -fP --show "$IMG")
        echo "LOOP=$LOOP" >> $GITHUB_ENV

        sudo mount ${LOOP}p2 /mnt/armbian || sudo mount ${LOOP} /mnt/armbian

    # =========================
    # 8. Prepare chroot
    # =========================
    - name: Prepare chroot
      run: |
        sudo mount --bind /dev /mnt/armbian/dev
        sudo mount --bind /proc /mnt/armbian/proc
        sudo mount --bind /sys /mnt/armbian/sys
        sudo cp /usr/bin/qemu-aarch64-static /mnt/armbian/usr/bin/

    # =========================
    # 9. Clone RTL8733BS
    # =========================
    - name: Get RTL8733BS driver
      run: |
        git clone https://github.com/xf110/rtl8733bs-20250521 driver

    # =========================
    # 10. Install headers + build driver
    # =========================
    - name: Build RTL8733BS in image
      run: |
        sudo chroot /mnt/armbian /bin/bash -c "
          apt update &&
          apt install -y build-essential dkms bc linux-headers-${KERNEL_FULL} || true
        "

        sudo cp -r driver /mnt/armbian/root/

        sudo chroot /mnt/armbian /bin/bash -c "
          cd /root/driver &&
          make clean || true &&
          make -j\$(nproc) KSRC=/lib/modules/${KERNEL_FULL}/build
        "

    # =========================
    # 11. Install module
    # =========================
    - name: Install driver
      run: |
        sudo chroot /mnt/armbian /bin/bash -c "
          cd /root/driver &&
          make install || true
        "

        sudo chroot /mnt/armbian /bin/bash -c "
          depmod -a ${KERNEL_FULL}
        "

        echo "8733bs" | sudo tee /mnt/armbian/etc/modules-load.d/rtl8733bs.conf

    # =========================
    # 12. Cleanup
    # =========================
    - name: Unmount image
      run: |
        sync
        sudo umount /mnt/armbian/dev || true
        sudo umount /mnt/armbian/proc || true
        sudo umount /mnt/armbian/sys || true
        sudo umount /mnt/armbian || true
        sudo losetup -d $LOOP || true

    # =========================
    # 13. Upload
    # =========================
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: HK1-LOCKED-6.12.90-RTL8733BS
        files: builder/build/output/images/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
