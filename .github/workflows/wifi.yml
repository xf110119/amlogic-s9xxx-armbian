name: Build Armbian HK1-Rbox-K8s (6.12.90)

on:
  workflow_dispatch:
  repository_dispatch:

env:
  TZ: Asia/Singapore
  ROOTFS_SCRIPT: compile-kernel/tools/script/docker/build_armbian_rootfs_file.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v6

      # =========================
      # 2. Clean environment
      # =========================
      - name: Init build environment
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo apt-get update
          sudo apt-get install -y \
            git curl wget xz-utils zip unzip \
            qemu-user-static binfmt-support \
            coreutils util-linux

          sudo timedatectl set-timezone "${TZ}"
          date -u

      # =========================
      # 3. Create build disk
      # =========================
      - name: Create build disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$((root_avail - 3))

          sudo truncate -s "${root_size}"G /root.img
          loop=$(sudo losetup --find --show /root.img)

          sudo mkfs.ext4 -F "${loop}"
          sudo mkdir -p /builder
          sudo mount "${loop}" /builder
          sudo chown -R runner:runner /builder

      # =========================
      # 4. Download Armbian build
      # =========================
      - name: Clone Armbian build
        working-directory: /builder
        run: |
          git clone --depth=1 https://github.com/armbian/build.git build
          ln -sf /builder/build $GITHUB_WORKSPACE/build

      # =========================
      # 5. Compile Armbian rootfs
      # =========================
      - name: Build Armbian (Bookworm)
        working-directory: /builder/build
        run: |
          chmod +x compile.sh

          ./compile.sh \
            RELEASE=bookworm \
            BOARD=odroidn2 \
            BRANCH=current \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            COMPRESS_OUTPUTIMAGE="sha"

      # =========================
      # 6. Prepare output
      # =========================
      - name: Prepare output
        run: |
          mkdir -p release
          cp -f /builder/build/output/images/*.img* release/

      # =========================
      # 7. Upload base image
      # =========================
      - name: Upload base image
        uses: ophub/upload-to-releases@main
        with:
          tag: "HK1-Rbox-K8s-6.12.90"
          artifacts: release/*
          allow_updates: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 8. Rebuild kernel (IMPORTANT)
      # =========================
      - name: Repack with ophub kernel 6.12.90
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: armbian
          armbian_path: release/*.img*
          armbian_board: hk1-rbox-k8s
          armbian_kernel: 6.12.90
          auto_kernel: false
          kernel_repo: ophub/kernel
          kernel_usage: stable
          armbian_fstype: ext4
          builder_name: ophub

      # =========================
      # 9. Upload final image
      # =========================
      - name: Upload final image
        uses: ophub/upload-to-releases@main
        with:
          tag: "HK1-Rbox-K8s-6.12.90"
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allow_updates: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## HK1 Rbox K8s Armbian Image

            - Board: hk1-rbox-k8s
            - Kernel: 6.12.90
            - Release: bookworm
            - Default user: root
            - Default password: 1234
            - Install: armbian-install
            - Update: armbian-update
