name: HK1-Armbian-6.12.90-RTL8733BS

on:
  workflow_dispatch:

env:
  TZ: Asia/Singapore
  KERNEL_VERSION: "6.12.90"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:

    # =========================
    # 1. Checkout
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 2. Base tools
    # =========================
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y \
          git curl wget xz-utils unzip \
          rsync kmod file \
          qemu-user-static binfmt-support \
          fdisk mount util-linux

    # =========================
    # 3. Clone ophub tool
    # =========================
    - name: Clone build tool
      run: |
        git clone --depth=1 https://github.com/ophub/amlogic-s9xxx-armbian.git builder

    # =========================
    # 4. Build Armbian image
    # =========================
    - name: Build Armbian image
      run: |
        cd builder

        ./rebuild \
          -b hk1-rbox-k8s \
          -k ${KERNEL_VERSION} \
          -u stable \
          -r ophub/kernel \
          -t ext4 \
          -s 512/3000

    # =========================
    # 5. Find image
    # =========================
    - name: Locate image
      run: |
        IMG=$(find builder/build/output/images -name "*.img*" | head -n1)
        echo "IMG=$IMG" >> $GITHUB_ENV
        echo "Image: $IMG"

    # =========================
    # 6. Mount image
    # =========================
    - name: Mount image
      run: |
        sudo mkdir -p /mnt/armbian

        LOOP=$(sudo losetup -fP --show "$IMG")
        echo "LOOP=$LOOP" >> $GITHUB_ENV

        sudo mount ${LOOP}p2 /mnt/armbian || sudo mount ${LOOP} /mnt/armbian

    # =========================
    # 7. Enter chroot prepare
    # =========================
    - name: Prepare chroot
      run: |
        sudo mount --bind /dev /mnt/armbian/dev
        sudo mount --bind /proc /mnt/armbian/proc
        sudo mount --bind /sys /mnt/armbian/sys
        sudo cp /usr/bin/qemu-aarch64-static /mnt/armbian/usr/bin/

    # =========================
    # 8. Clone RTL8733BS driver
    # =========================
    - name: Get RTL8733BS driver
      run: |
        git clone https://github.com/xf110/rtl8733bs-20250521 driver

    # =========================
    # 9. Build driver inside image
    # =========================
    - name: Compile RTL8733BS
      run: |
        sudo chroot /mnt/armbian /bin/bash -c "
          apt update &&
          apt install -y build-essential bc dkms linux-headers-${KERNEL_VERSION}-current-meson64 || true
        "

        sudo cp -r driver /mnt/armbian/root/

        sudo chroot /mnt/armbian /bin/bash -c "
          cd /root/driver &&
          make clean || true &&
          make -j$(nproc) KSRC=/lib/modules/${KERNEL_VERSION}-current-meson64/build
        "

    # =========================
    # 10. Install module
    # =========================
    - name: Install driver
      run: |
        sudo chroot /mnt/armbian /bin/bash -c "
          cd /root/driver &&
          make install || true
        "

        sudo chroot /mnt/armbian /bin/bash -c "
          depmod -a ${KERNEL_VERSION}-current-meson64
        "

        echo "8733bs" | sudo tee /mnt/armbian/etc/modules-load.d/rtl8733bs.conf

    # =========================
    # 11. Cleanup
    # =========================
    - name: Cleanup mount
      run: |
        sync
        sudo umount /mnt/armbian/dev || true
        sudo umount /mnt/armbian/proc || true
        sudo umount /mnt/armbian/sys || true
        sudo umount /mnt/armbian || true
        sudo losetup -d $LOOP || true

    # =========================
    # 12. Upload image
    # =========================
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: HK1-6.12.90-rtl8733bs
        files: builder/build/output/images/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
