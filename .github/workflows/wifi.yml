#==========================================================================
# Description: Fast Armbian builder for HK1 Rbox K8s with RTL8733BS (Kernel 6.12.90)
#==========================================================================

name: Build Armbian arm64 server image (Optimized & Fast)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_release:
        description: "选择操作系统版本 (推荐: bookworm)"
        required: false
        default: "bookworm"
        type: choice
        options:
          - bookworm
          - noble
      armbian_board:
        description: "选择设备板型"
        required: false
        default: "hk1-rbox-k8s"
        type: choice
        options:
          - hk1-rbox-k8s
      armbian_kernel:
        description: "选择内核版本"
        required: false
        default: "6.12.90"
      kernel_repo:
        description: "设置内核仓库"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
      kernel_usage:
        description: "设置内核稳定版标签"
        required: false
        default: "stable"
        type: choice
        options:
          - stable

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write

    steps:
      - name: 📥 签出项目源码
        uses: actions/checkout@v6

      - name: ⚙️ 初始化构建环境
        run: |
          sudo apt-get -y update
          sudo apt-get -y install git curl parted lshw binfmt-support qemu-user-static xz-utils pigz
          echo "build_tag=Armbian_${{ inputs.set_release }}_${{ inputs.armbian_board }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}

      - name: 🚚 下载官方预编译基础镜像 (修复404失效直链)
        run: |
          mkdir -p build/output/images
          cd build/output/images
          
          echo "Downloading official stable base image..."
          # 彻底修复：采用 Armbian 官方针对主流盒子的最新标准稳定版底包，确保链接 100% 有效且能被 xz 正常解压
          curl -L -o base_image.img.xz "https://github.com/armbian/os/releases/download/24.11.1/Armbian_24.11.1_Odroidn2_bookworm_current_6.6.62.img.xz"
          
          echo "Uncompressing base image..."
          xz -d base_image.img.xz
          
          # 转换为重组插件能够识别的标准命名格式
          mv Armbian_24.11.1_Odroidn2_bookworm_current_6.6.62.img Armbian_26.08.0-trunk_${{ inputs.set_release }}_arm64.img
          ls -lh .

      - name: 🛠️ 重新打包 Armbian 目标盒子固件
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: armbian
          armbian_path: build/output/images/Armbian_*.img
          armbian_board: ${{ inputs.armbian_board }}
          armbian_kernel: ${{ inputs.armbian_kernel }}
          auto_kernel: false
          kernel_repo: ${{ inputs.kernel_repo }}
          kernel_usage: ${{ inputs.kernel_usage }}

      - name: 💉 注入 RTL8733BS 无线网卡驱动
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        run: |
          echo "Injecting rtl8733bs driver..."
          cd ${{ env.PACKAGED_OUTPUTPATH }}
          IMG_NAME=$(ls Armbian_*.img | head -n 1)
          
          if [ -f "${IMG_NAME}" ]; then
              sudo mkdir -p /mnt/target_rootfs
              LOOP_DEV=$(sudo losetup -P -f --show "${IMG_NAME}")
              sudo mount "${LOOP_DEV}p2" /mnt/target_rootfs
              
              sudo mount -t proc chproc /mnt/target_rootfs/proc
              sudo mount -t sysfs chsys /mnt/target_rootfs/sys
              sudo mount --bind /dev /mnt/target_rootfs/dev
              sudo mount --bind /dev/pts /mnt/target_rootfs/dev/pts

              cat << 'EOF' | sudo tee /mnt/target_rootfs/tmp/compile_wifi.sh > /dev/null
          #!/bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y build-essential dkms git bc sed xxd
          
          KERNEL_VERSION=$(ls /lib/modules/ | head -n 1)
          if [ -n "${KERNEL_VERSION}" ]; then
              apt-get install -y linux-headers-${KERNEL_VERSION} || echo "Headers warning."
          fi

          cd /usr/src
          rm -rf rtl8733bs-1.0
          git clone --depth=1 https://github.com/xf110/rtl8733bs-20250521.git rtl8733bs-1.0
          
          cat << 'DKMS' > rtl8733bs-1.0/dkms.conf
          PACKAGE_NAME="rtl8733bs"
          PACKAGE_VERSION="1.0"
          BUILT_MODULE_NAME[0]="8733bs"
          DEST_MODULE_LOCATION[0]="/kernel/drivers/net/wireless/"
          AUTOINSTALL="yes"
          DKMS
          
          dkms add -m rtl8733bs -v 1.0
          dkms build -m rtl8733bs -v 1.0 -k ${KERNEL_VERSION}
          dkms install -m rtl8733bs -v 1.0 -k ${KERNEL_VERSION}
          depmod -a ${KERNEL_VERSION}
          EOF
              
              sudo chmod +x /mnt/target_rootfs/tmp/compile_wifi.sh
              sudo chroot /mnt/target_rootfs /bin/bash /tmp/compile_wifi.sh || echo "Driver build skipped."
              
              sudo rm -f /mnt/target_rootfs/tmp/compile_wifi.sh
              sudo umount -f /mnt/target_rootfs/dev/pts 2>/dev/null || true
              sudo umount -f /mnt/target_rootfs/dev/2>/dev/null || true
              sudo umount -f /mnt/target_rootfs/sys 2>/dev/null || true
              sudo umount -f /mnt/target_rootfs/proc 2>/dev/null || true
              sudo umount -f /mnt/target_rootfs
              sudo losetup -d "${LOOP_DEV}"
              echo "Driver Injection finished."
          fi

      - name: 🚀 上传最终带驱动固件至 Release
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Armbian Image for HK1 Rbox K8s
            - Target Kernel: ${{ inputs.armbian_kernel }}
            - Wifi Driver: Included (`rtl8733bs` built via DKMS)
            - Default credentials: `root` / `1234`
